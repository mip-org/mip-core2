name: finufft
description: "FINUFFT nonuniform FFT"
version: "2.5.0"
license: "Apache-2.0"
homepage: "https://finufft.readthedocs.io"
repository: "https://github.com/flatironinstitute/finufft"
dependencies: []

symbol_extensions: [".m", ".js"]

addpaths:
  # It's very important that the numbl directory is added first
  - path: "numbl"
  - path: "."

builds:
  # MEX builds for real MATLAB
  - architectures: [linux_x86_64, macos_x86_64]
    release_number: 9
    compile_script: compile.m
  # Numbl builds
  - architectures: [numbl_wasm]
    release_number: 9
    build_script: numbl/build_wasm.sh
    build_env:
      FINUFFT_SRC: finufft_src
  - architectures: [numbl_linux_x86_64]
    release_number: 9
    build_script: numbl/build_native.sh
    build_env:
      FINUFFT_SRC: finufft_src
  - architectures: [numbl_macos_x86_64]
    release_number: 9
    build_script: numbl/build_native.sh
    build_env:
      FINUFFT_SRC: finufft_src
